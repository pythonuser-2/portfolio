name: Scheduled Portfolio Expansion

on:
  schedule:
    # Triggers automatically every single day at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger testing if needed

jobs:
  deploy-project:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Matrix
      uses: actions/checkout@v4

    - name: Dynamically Inject Day 2 Subpage
      run: |
        # Copies the folder into the root so it forms its own URL path
        if [ -d "projects/day2-sip" ]; then
          echo "Release window verified. Deploying Day 2 subpage..."
          cp -r projects/day2-sip .
        fi

    - name: Commit Tracking Update
      run: |
        git config --global user.name "pythonuser-2"
        git config --global user.email "pythonuser-2@users.noreply.github.com"
        git add .
        git diff-index --quiet HEAD || git commit -m "Automated System Check: Day 2 Subpage live"
        git push origin main