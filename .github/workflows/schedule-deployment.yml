name: Deploy Portfolio and Projects

on:
  push:
    branches: ["main"] # Triggers instantly whenever you push new code
  workflow_dispatch: # Allows manual trigger testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your exact repository folder structure as-is

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
